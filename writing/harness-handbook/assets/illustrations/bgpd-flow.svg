        <rect x="640" y="166" width="170" height="28" rx="7" fill="#fdfcfa" stroke="#e6e2d8" stroke-width="1"></rect>
        <text x="652" y="184.5" font-size="11.3" fill="#6f6a61" font-family="'IBM Plex Mono', ui-monospace, monospace">manager.py</text>
