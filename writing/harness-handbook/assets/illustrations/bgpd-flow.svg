        <text x="234" y="77.5" font-size="12.5" font-weight="500" fill="#4a463f">input</text>
      </g><g opacity="1">
        <rect x="220" y="96" width="160" height="30" rx="7" fill="#eaf1fb" stroke="color-mix(in srgb, #2a78d6 55%, #e6e2d8)" stroke-width="1.4"></rect>
        <text x="234" y="115.5" font-size="12.5" font-weight="650" fill="#1c5cab">plan</text>
      </g><g opacity="1">
        <rect x="220" y="134" width="160" height="30" rx="7" fill="#eaf1fb" stroke="color-mix(in srgb, #2a78d6 55%, #e6e2d8)" stroke-width="1.4"></rect>
        <text x="234" y="153.5" font-size="12.5" font-weight="650" fill="#1c5cab">act</text>
      </g><g opacity="0.42">
        <rect x="220" y="172" width="160" height="30" rx="7" fill="#fdfcfa" stroke="#e6e2d8" stroke-width="1"></rect>
        <text x="234" y="191.5" font-size="12.5" font-weight="500" fill="#4a463f">observe</text>
      </g><g opacity="0.42">
        <rect x="220" y="210" width="160" height="30" rx="7" fill="#fdfcfa" stroke="#e6e2d8" stroke-width="1"></rect>
        <text x="234" y="229.5" font-size="12.5" font-weight="500" fill="#4a463f">finalize</text>
      </g>

