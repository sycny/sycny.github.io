<?xml version="1.0" encoding="UTF-8"?>
<!-- Standalone light-theme export. Generated from the theme-aware version in script.js — keep in sync. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 358" role="img" aria-label="BGPD narrows a request through stages and units to code links and an edit plan">
<style>text{font-family:Inter,"Source Sans 3",system-ui,sans-serif}</style>
  <text x="20" y="40" font-size="11" font-weight="650" fill="#8d887e" letter-spacing=".1em">1 · REQUEST</text>
  <text x="220" y="40" font-size="11" font-weight="650" fill="#8d887e" letter-spacing=".1em">2 · STAGES</text>
