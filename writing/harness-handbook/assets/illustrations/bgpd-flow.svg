        <rect x="430" y="115" width="170" height="30" rx="7" fill="#eaf1fb" stroke="color-mix(in srgb, #2a78d6 55%, #e6e2d8)" stroke-width="1.4"></rect>
        <text x="444" y="134.5" font-size="12.5" font-weight="650" fill="#1c5cab">Prompt rule</text>
