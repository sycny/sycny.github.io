  <text x="850" y="40" font-size="11" font-weight="650" fill="#8d887e" letter-spacing=".1em">5 · EDIT PLAN</text>

  <!-- 1 · request -->
  <rect x="20" y="102" width="160" height="88" rx="10" fill="#f9efe3" stroke="color-mix(in srgb, #bd5f16 34%, #e6e2d8)"></rect>
  <text x="100" y="138" font-size="13" fill="#4a463f" text-anchor="middle" font-style="italic">“Add confirmation</text>
  <text x="100" y="158" font-size="13" fill="#4a463f" text-anchor="middle" font-style="italic">before delete.”</text>

  <!-- 2 · stages -->
  <g opacity="0.42">
