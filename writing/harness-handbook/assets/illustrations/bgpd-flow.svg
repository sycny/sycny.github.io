        <text x="652" y="112.5" font-size="11.3" fill="#1c5cab" font-family="'IBM Plex Mono', ui-monospace, monospace">system.md</text>
      </g><g opacity="1">
        <rect x="640" y="130" width="170" height="28" rx="7" fill="#eaf1fb" stroke="color-mix(in srgb, #2a78d6 55%, #e6e2d8)" stroke-width="1.4"></rect>
        <text x="652" y="148.5" font-size="11.3" fill="#1c5cab" font-family="'IBM Plex Mono', ui-monospace, monospace">flags.py · L12</text>
