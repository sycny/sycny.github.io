      </g>

  <!-- 5 · edit plan -->
  <rect x="850" y="58" width="140" height="150" rx="10" fill="#fdfcfa" stroke="#e6e2d8"></rect>
  
      <text x="866" y="92" font-size="14" font-weight="700" fill="#0a700a">+</text>
      <text x="882" y="91" font-size="11.6" fill="#4a463f">confirm check</text>
  
      <text x="866" y="122" font-size="14" font-weight="700" fill="#0a700a">+</text>
      <text x="882" y="121" font-size="11.6" fill="#4a463f">prompt rule</text>
  
      <text x="866" y="152" font-size="14" font-weight="700" fill="#9a4a0b">−</text>
      <text x="882" y="151" font-size="11.6" fill="#4a463f">direct delete</text>
  <text x="866" y="190" font-size="11" fill="#6f6a61">scoped, minimal</text>

  <!-- arrows -->
  <path d="M186 146 H207" stroke="#2a78d6" stroke-width="1.6" fill="none"></path><polygon points="206,141.5 214,146 206,150.5" fill="#2a78d6"></polygon>
  <path d="M386 146 H417" stroke="#2a78d6" stroke-width="1.6" fill="none"></path><polygon points="416,141.5 424,146 416,150.5" fill="#2a78d6"></polygon>
  <path d="M606 146 H627" stroke="#2a78d6" stroke-width="1.6" fill="none"></path><polygon points="626,141.5 634,146 626,150.5" fill="#2a78d6"></polygon>
  <path d="M816 146 H837" stroke="#2a78d6" stroke-width="1.6" fill="none"></path><polygon points="836,141.5 844,146 836,150.5" fill="#2a78d6"></polygon>

  <!-- coarse → fine axis -->
  <path d="M220 296 H960" stroke="#e6e2d8" stroke-width="1"></path>
  <polygon points="960,292 968,296 960,300" fill="#8d887e"></polygon>
  <text x="220" y="320" font-size="12" fill="#6f6a61">coarse — the whole system</text>
  <text x="968" y="320" font-size="12" fill="#6f6a61" text-anchor="end">fine — one edit</text>
  <text x="594" y="348" font-size="12.5" fill="#6f6a61" text-anchor="middle" font-style="italic">Each step reveals only what the current decision needs — the repository stays the ground truth.</text>
</svg>
