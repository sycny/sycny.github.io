        <text x="444" y="172.5" font-size="12.5" font-weight="500" fill="#4a463f">Tool wrapper</text>
      </g><g opacity="0.42">
        <rect x="430" y="191" width="170" height="30" rx="7" fill="#fdfcfa" stroke="#e6e2d8" stroke-width="1"></rect>
        <text x="444" y="210.5" font-size="12.5" font-weight="500" fill="#4a463f">Fallback path</text>
      </g>

