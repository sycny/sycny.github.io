<?xml version="1.0" encoding="UTF-8"?>
<!-- Standalone light-theme export. Generated from the theme-aware version in script.js — keep in sync. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 508" role="img" aria-label="One behavioral request maps to six scattered files in the harness codebase">
<style>text{font-family:Inter,"Source Sans 3",system-ui,sans-serif}</style>
  <!-- left: the request -->
  <text x="135" y="100" font-size="11" font-weight="650" fill="#9a4a0b" text-anchor="middle" letter-spacing=".12em">THE REQUEST</text>
  <rect x="20" y="116" width="230" height="92" rx="10" fill="#f9efe3" stroke="color-mix(in srgb, #bd5f16 34%, #e6e2d8)"></rect>
  <text x="135" y="154" font-size="14.5" fill="#4a463f" text-anchor="middle" font-style="italic">“Ask for confirmation</text>
  <text x="135" y="176" font-size="14.5" fill="#4a463f" text-anchor="middle" font-style="italic">before destructive tool calls.”</text>
  <text x="135" y="238" font-size="12.5" fill="#6f6a61" text-anchor="middle">Sounds like a one-line change.</text>
  <path d="M256 162 H319" stroke="#bd5f16" stroke-width="1.6" fill="none"></path><polygon points="318,157.5 326,162 318,166.5" fill="#bd5f16"></polygon>

  <!-- middle: file tree -->
  <rect x="330" y="20" width="292" height="462" rx="10" fill="#fdfcfa" stroke="#e6e2d8"></rect>
  <text x="350" y="48" font-size="12.5" font-weight="600" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">harness/</text>
  <path d="M330 62 H622" stroke="#efece4" stroke-width="1"></path>
  <text x="352" y="84" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">core/</text><text x="374" y="107.5" font-size="12" font-weight="400" fill="#6f6a61" font-family="'IBM Plex Mono', ui-monospace, monospace">loop.py</text><rect x="340" y="116" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="126.5" r="3.4" fill="#bd5f16"></circle><text x="368" y="131" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">state_manager.py</text><path d="M614 126.5 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="130.5" font-size="12.5" fill="#4a463f">tracks the pending confirmation</text><text x="352" y="154.5" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">tools/</text><rect x="340" y="163" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="173.5" r="3.4" fill="#bd5f16"></circle><text x="368" y="178" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">wrapper.py</text><path d="M614 173.5 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="177.5" font-size="12.5" fill="#4a463f">intercepts the destructive call</text><text x="374" y="201.5" font-size="12" font-weight="400" fill="#6f6a61" font-family="'IBM Plex Mono', ui-monospace, monospace">registry.py</text><text x="352" y="225" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">prompts/</text><rect x="340" y="233.5" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="244" r="3.4" fill="#bd5f16"></circle><text x="368" y="248.5" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">system.md</text><path d="M614 244 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="248" font-size="12.5" fill="#4a463f">tells the model when to ask</text><text x="352" y="272" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">config/</text><rect x="340" y="280.5" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="291" r="3.4" fill="#bd5f16"></circle><text x="368" y="295.5" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">flags.py</text><path d="M614 291 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="295" font-size="12.5" fill="#4a463f">feature gate for the behavior</text><text x="352" y="319" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">memory/</text><text x="374" y="342.5" font-size="12" font-weight="400" fill="#6f6a61" font-family="'IBM Plex Mono', ui-monospace, monospace">store.py</text><text x="352" y="366" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">telemetry/</text><rect x="340" y="374.5" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="385" r="3.4" fill="#bd5f16"></circle><text x="368" y="389.5" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">events.py</text><path d="M614 385 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="389" font-size="12.5" fill="#4a463f">logs the outcome</text><text x="352" y="413" font-size="12" font-weight="400" fill="#8d887e" font-family="'IBM Plex Mono', ui-monospace, monospace">consumers/</text><rect x="340" y="421.5" width="272" height="21" rx="5" fill="#f9efe3"></rect><circle cx="356" cy="432" r="3.4" fill="#bd5f16"></circle><text x="368" y="436.5" font-size="12" font-weight="500" fill="#4a463f" font-family="'IBM Plex Mono', ui-monospace, monospace">result_handler.py</text><path d="M614 432 H646" stroke="#e6e2d8" stroke-width="1.2"></path><text x="654" y="436" font-size="12.5" fill="#4a463f">consumes the user's decision</text>

  <!-- right: what each site does -->
  <text x="790" y="48" font-size="11" font-weight="650" fill="#57534a" text-anchor="middle" letter-spacing=".12em">WHAT EACH SITE DOES</text>
  <circle cx="660" cy="474" r="3.4" fill="#bd5f16"></circle>
  <text x="672" y="478.5" font-size="12.5" font-weight="600" fill="#4a463f">6 sites across 4 subsystems.</text>
  <text x="672" y="497" font-size="12.5" fill="#6f6a61">Half never mention “confirm”.</text>
</svg>
